<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Web - Teknologi Rekayasa Elektro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f4f7f6; 
        }
        .hero {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 100px 0 80px 0;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            margin-bottom: 50px;
        }
        .menu-card {
            border: none;
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background-color: #eff6ff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }
    </style>
</head>
<body>

    <header class="hero text-center shadow">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Portal Layanan Terpadu TRE</h1>
            <p class="lead opacity-75">Departemen Teknik Elektro dan Informatika - Vokasi UGM</p>
        </div>
    </header>

    <main class="container">
        <div class="row justify-content-center g-4">
            
            <div class="col-md-5">
                <a href="https://tresvugm.github.io/Inventaris-Laboratorium-TRE/" class="card h-100 menu-card shadow-sm text-center p-5">
                    <div class="card-body">
                        <div class="icon-box">
                            <i class="bi bi-box-seam" style="font-size: 2.5rem; color: #1e3a8a;"></i>
                        </div>
                        <h3 class="fw-bold mb-3">Sistem Inventaris</h3>
                        <p class="text-muted">Akses data inventaris peralatan dan komponen di seluruh laboratorium TRE</p>
                    </div>
                </a>
            </div>

            <div class="col-md-5">
                <a href="#" class="card h-100 menu-card shadow-sm text-center p-5">
                    <div class="card-body">
                        <div class="icon-box">
                            <i class="bi bi-file-earmark-text" style="font-size: 2.5rem; color: #1e3a8a;"></i>
                        </div>
                        <h3 class="fw-bold mb-3">Modul Praktikum</h3>
                        <p class="text-muted">Akses modul praktikum mahasiswa TRE</p>
                    </div>
                </a>
            </div>

        </div>
    </main>

    <footer class="text-center py-5 text-muted mt-5">
        <p>&copy; 2026 Teknologi Rekayasa Elektro</p>
    </footer>

</body>
</html>
